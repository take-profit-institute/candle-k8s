# candle-k8s 매니페스트 검증 — kustomize build + helm template + kubeconform
name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - name: Setup kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Kustomize overlays
        run: |
          for o in platform/manifests/overlays/dev platform/manifests/overlays/prod; do
            echo "== $o =="
            kubectl kustomize "$o" > /dev/null
          done

      - name: Helm template (service chart)
        run: |
          helm template t services/chart \
            --set name=trading --set image.repository=x/trading \
            --set dbSecret=candle/dev/rds/trading \
            --set serviceAccount.roleArn=arn:aws:iam::0:role/r > /dev/null

      - name: kubeconform (CRD skip)
        # CRD(Strimzi/Istio/External-Secrets)는 원격 스키마가 없거나 raw.githubusercontent
        # 레이트리밋으로 다운로드가 네트워크 실패하면 -ignore-missing-schemas 로도 안 걸러지고
        # 하드 에러가 난다(스키마 없음≠다운로드 실패). CRD kind 를 명시적으로 skip 해
        # 원격 의존을 제거한다 — CRD 정합성은 각 오퍼레이터 admission webhook 이 검증한다.
        run: |
          kubectl kustomize platform/manifests/overlays/dev | \
            kubeconform -strict -ignore-missing-schemas -summary \
              -skip KafkaConnect,KafkaConnector,ExternalSecret,ClusterSecretStore,Gateway,VirtualService,DestinationRule,PeerAuthentication
