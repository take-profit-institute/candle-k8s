{{- if .Values.dbSecret }}
# 도메인 DB 자격증명(JobRepository + 처리 데이터) → <name>-db Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.name }}-db
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.name }}-db
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.dbSecret }}
{{- end }}
