apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "candle-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "candle-service.selector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "candle-service.selector" . | nindent 8 }}
        {{- include "candle-service.labels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        # Istio prometheus merge가 앱 메트릭 위치를 알도록 (병합 후 15020 노출)
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.port }}"
        prometheus.io/path: "{{ .Values.metrics.path }}"
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.name }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
            {{- if .Values.grpc.enabled }}
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
            {{- end }}
          {{- if .Values.dbSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.name }}-db
          {{- end }}
          env:
            # 서비스별 server.port(8081~)를 컨테이너에서 8080으로 통일
            - name: SERVER_PORT
              value: "{{ .Values.port }}"
            {{- if .Values.grpc.enabled }}
            - name: GRPC_SERVER_PORT
              value: "{{ .Values.grpc.port }}"
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.grpc.enabled }}
          # gRPC 서버가 떠서 Health Check Protocol(grpc.health.v1.Health)에 응답할 때까지 대기
          startupProbe:
            grpc:
              port: {{ .Values.grpc.port }}
            failureThreshold: 30
            periodSeconds: 5
          {{- end }}
          # liveness는 HTTP(Istio가 probe rewrite로 mTLS 우회) — 프로세스 생존 확인
          livenessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            {{- if .Values.grpc.enabled }}
            # readiness는 gRPC Health Check — gRPC 서빙 가능할 때만 트래픽 수신
            grpc:
              port: {{ .Values.grpc.port }}
            {{- else }}
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.port }}
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
