{{- if .Values.dbSecret }}
# Secrets Manager(dbSecret) → <name>-db Secret. ESO IRSA로 인증.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.name }}-db
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.name }}-db
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.dbSecret }}
{{- end }}
{{- if .Values.appSecret }}
---
# Secrets Manager(appSecret) → <name>-app Secret. OAuth/JWT 등 앱 설정 키를 그대로 env 주입.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.name }}-app
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.name }}-app
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.appSecret }}
{{- end }}
