{{- if .Values.dbSecret }}
# Secrets Manager(dbSecret) → <name>-db Secret. ESO IRSA로 인증.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.name }}-db
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.name }}-db
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.dbSecret }}
{{- end }}
