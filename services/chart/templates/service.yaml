apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "candle-service.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "candle-service.selector" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.servicePort }}
      targetPort: {{ .Values.port }}
