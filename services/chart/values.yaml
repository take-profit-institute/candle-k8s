# ApplicationSet이 서비스별로 덮어쓴다.
name: ""            # 서비스명 (= SA명, Service명)
namespace: candle

image:
  repository: "" # <ECR>/candle/<svc>
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2
port: 8080         # HTTP 컨테이너 포트 (REST/actuator)
servicePort: 80    # ClusterIP HTTP 포트 (메시 내부)

http:
  enabled: true

# ALB(ws ingress) 타깃 그룹 헬스체크 경로. 설정 시 Service에 애너테이션 생성.
# WS 서비스(chatting-service)는 ALB 기본 "/" 헬스체크가 404라 /actuator/health로 지정 필요.
albHealthcheckPath: ""

# 내부 동기 통신용 gRPC 서버 (별도 Netty 포트). BFF 같은 클라이언트 전용은 false.
grpc:
  enabled: false
  port: 9090       # 컨테이너 gRPC 포트 (grpc.server.port)
  servicePort: 9090

# IRSA — 비우면 SA 애너테이션 없음 (예: bff)
serviceAccount:
  roleArn: ""

# Secrets Manager 키 — 설정 시 ExternalSecret 생성 → <name>-db Secret으로 주입
dbSecret: ""       # 예: candle/dev/rds/trading
dbEnvPrefix: ""    # 예: TRADING → TRADING_DB_URL/USERNAME/PASSWORD도 함께 주입

# HTTP 헬스 경로 (Spring actuator 기본). Node 등은 override (예: bff → /health)
healthPath: /actuator/health

# Prometheus 메트릭 (Istio merge → 사이드카 15020에서 수집)
metrics:
  enabled: true
  path: /actuator/prometheus  # 앱 메트릭 경로 (Node 등은 override, 예: /metrics)
  interval: 30s

# 추가 평문 환경변수
env: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
