# prod Spring Batch CronJob — 단일 batch 이미지, Job별 CronJob
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: candle-batch-prod
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - { name: reservation-execute,  tag: bootstrap, jobName: "reservation.execute.v1",   schedule: "* * * * *" }
          - { name: reservation-expire,   tag: bootstrap, jobName: "reservation.expire.v1",    schedule: "*/10 * * * *" }
          - { name: mission-expire,       tag: bootstrap, jobName: "mission.expire.v1",        schedule: "5 0 * * *" }
          - { name: outbox-republish,     tag: bootstrap, jobName: "outbox.republish.v1",      schedule: "*/5 * * * *" }
          - { name: idempotency-cleanup,  tag: bootstrap, jobName: "idempotency.cleanup.v1",   schedule: "0 4 * * *" }
  template:
    metadata:
      name: "batch-{{ .name }}"
    spec:
      project: candle
      source:
        repoURL: https://github.com/take-profit-institute/candle-k8s.git
        targetRevision: main
        path: services/batch-chart
        helm:
          valuesObject:
            name: "{{ .name }}"
            namespace: candle
            image:
              repository: "<ECR>/candle/batch"
              tag: "{{ .tag }}"
            jobName: "{{ .jobName }}"
            schedule: "{{ .schedule }}"
            serviceAccountName: batch
            dbSecret: "candle/prod/rds/batch"
      destination:
        server: https://kubernetes.default.svc
        namespace: candle
      syncPolicy:
        automated: { prune: true, selfHeal: true }
