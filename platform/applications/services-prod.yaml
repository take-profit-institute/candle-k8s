# prod 마이크로서비스 (tag는 CI가 git SHA로 bump)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: candle-services-prod
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - { name: auth-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-auth",         dbSecret: "candle/prod/rds/auth",         dbEnvPrefix: "AUTH" }
          - { name: user-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-users",        dbSecret: "candle/prod/rds/users",        dbEnvPrefix: "USER" }
          - { name: trading-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-trading",      dbSecret: "candle/prod/rds/trading",      dbEnvPrefix: "TRADING" }
          - { name: portfolio-service,    tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-portfolio",    dbSecret: "candle/prod/rds/portfolio",    dbEnvPrefix: "PORTFOLIO" }
          - { name: ranking-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-ranking",      dbSecret: "candle/prod/rds/ranking",      dbEnvPrefix: "RANKING" }
          - { name: mission-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-mission",      dbSecret: "candle/prod/rds/mission",      dbEnvPrefix: "MISSION" }
          - { name: learning-service,     tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-learning",     dbSecret: "candle/prod/rds/learning",     dbEnvPrefix: "LEARNING" }
          - { name: market-service,       tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-market",       dbSecret: "candle/prod/timescale/market", dbEnvPrefix: "MARKET" }
          - { name: notification-service, tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-notification", dbSecret: "candle/prod/rds/notification", dbEnvPrefix: "NOTIFICATION" }
          - { name: stock-service,        tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-stock",        dbSecret: "candle/prod/rds/stock",        dbEnvPrefix: "STOCK" }
          - { name: wishlist-service,     tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-wishlist",     dbSecret: "candle/prod/rds/wishlist",     dbEnvPrefix: "WISHLIST" }
          - { name: news-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::633597729239:role/candle-prod-news",         dbSecret: "candle/prod/rds/news",         dbEnvPrefix: "NEWS" }
          # batch는 상시 gRPC 서버(replica=1, HPA off). 스케줄은 앱 내부 @Scheduled가 담당(CronJob 아님).
          # 스케줄러 단일 실행 보장을 위해 replica=1 고정. 필요한 잡만 BATCH_*_ENABLED로 켠다.
          - { name: batch,                tag: bootstrap, replicas: 1, grpc: true,  http: false, metricsEnabled: false, hpaEnabled: false, roleArn: "arn:aws:iam::633597729239:role/candle-prod-batch",        dbSecret: "candle/prod/rds/batch",        dbEnvPrefix: "BATCH", env: [ { name: "BATCH_TRADING_ENABLED", value: "true" }, { name: "BATCH_PORTFOLIO_EOD_ENABLED", value: "true" }, { name: "BATCH_STOCK_SYNC_ENABLED", value: "true" } ] }
          - { name: bff,                  tag: bootstrap, grpc: false, http: true,  metricsEnabled: true,  hpaEnabled: true,  healthPath: "/health", metricsPath: "/metrics", roleArn: "",           dbSecret: "" }
          # 종목 실시간 채팅 WS 게이트웨이 (gRPC 없음). REDIS_URL·AUTH_JWT_HMAC_SECRET·CHAT_CORS_ALLOWED_ORIGINS는
          # chat 시크릿 번들(candle/prod/chat)로 envFrom 주입. ALB(ws ingress)가 /chat 타깃을 /actuator/health로 헬스체크.
          - { name: chatting-service,     tag: bootstrap, grpc: false, http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "",           dbSecret: "candle/prod/chat", albHealthcheckPath: "/actuator/health" }
  template:
    metadata:
      name: "svc-{{ .name }}"
    spec:
      project: candle
      source:
        repoURL: https://github.com/take-profit-institute/candle-k8s.git
        targetRevision: main
        path: services/chart
        helm:
          # values(문자열 블록) — ArgoCD goTemplate 렌더 후 Helm이 타입 파싱. valuesObject의 unquoted {{ }}는
          # 유효 YAML이 아니라 파싱 불가라 values 블록으로 처리한다.
          values: |
            name: {{ .name }}
            namespace: candle
            image:
              repository: 633597729239.dkr.ecr.ap-northeast-2.amazonaws.com/candle/{{ .name }}
              tag: {{ .tag }}
            replicas: {{ default 3 .replicas }}
            http:
              enabled: {{ .http }}
            grpc:
              enabled: {{ .grpc }}
            healthPath: {{ default "/actuator/health" .healthPath }}
            metrics:
              enabled: {{ .metricsEnabled }}
              path: {{ default "/actuator/prometheus" .metricsPath }}
            hpa:
              enabled: {{ .hpaEnabled }}
              minReplicas: {{ default 3 .hpaMinReplicas }}
            serviceAccount:
              roleArn: {{ .roleArn | quote }}
            dbSecret: {{ .dbSecret | quote }}
            dbEnvPrefix: {{ default "" .dbEnvPrefix | quote }}
            albHealthcheckPath: {{ default "" .albHealthcheckPath | quote }}
            {{- with .env }}
            env:
              {{- range . }}
              - name: {{ .name }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: candle
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - RespectIgnoreDifferences=true
