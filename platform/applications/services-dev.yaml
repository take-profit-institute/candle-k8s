# dev 마이크로서비스 — 범용 차트를 서비스별로 인스턴스화
# tag는 CI가 git SHA로 bump (ECR IMMUTABLE → latest 불가). 초기값 bootstrap.
# roleArn/dbSecret는 Terraform 출력과 1:1 (role명은 DB명 기준: user→users 등)
# 633597729239는 실제 계정 ID로 치환 (terraform output irsa_app_role_arns)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: candle-services-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - {name: auth-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-auth", dbSecret: "candle/dev/rds/auth", dbEnvPrefix: "AUTH", appSecret: "candle/dev/auth"}
          - {name: user-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-users", dbSecret: "candle/dev/rds/users", dbEnvPrefix: "USER"}
          - {name: trading-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-trading", dbSecret: "candle/dev/rds/trading", dbEnvPrefix: "TRADING"}
          - {name: portfolio-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-portfolio", dbSecret: "candle/dev/rds/portfolio", dbEnvPrefix: "PORTFOLIO"}
          - {name: ranking-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-ranking", dbSecret: "candle/dev/rds/ranking", dbEnvPrefix: "RANKING"}
          # mission은 gRPC 서버가 없어(HTTP 전용) grpc:true 로 두면 gRPC startupProbe(9090)가
          # 200s 예산 내 통과 못해 kill→재기동 무한루프. bff/chatting 처럼 http 전용으로 처리.
          # (추후 실제 gRPC 서버 구현 시 grpc:true 로 되돌린다)
          - {name: mission-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: false, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-mission", dbSecret: "candle/dev/rds/mission", dbEnvPrefix: "MISSION"}
          - {name: learning-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-learning", dbSecret: "candle/dev/rds/learning", dbEnvPrefix: "LEARNING"}
          - {name: market-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-market", dbSecret: "candle/dev/timescale/market", dbEnvPrefix: "MARKET", appSecret: "candle/dev/market"}
          - {name: notification-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-notification", dbSecret: "candle/dev/rds/notification", dbEnvPrefix: "NOTIFICATION", firebaseCredentialsSecret: "notification-firebase"}
          - {name: stock-service, tag: 1aeecc612ac8d3a148ea71a333adb4eec7c970ff, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-stock", dbSecret: "candle/dev/rds/stock", dbEnvPrefix: "STOCK", appSecret: "candle/dev/stock"}
          - {name: wishlist-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-wishlist", dbSecret: "candle/dev/rds/wishlist", dbEnvPrefix: "WISHLIST"}
          # news는 gRPC 서버는 뜨지만 grpc.health.v1.Health 를 등록하지 않아 gRPC probe가
          # UNIMPLEMENTED로 실패→재기동 무한루프. gRPC Service 포트(9090)는 유지하되(=BFF가 계속 호출)
          # startup/readiness probe만 HTTP(actuator)로 전환. (앱에서 gRPC 헬스 서비스 켜면 grpcHealth 제거)
          - {name: news-service, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, grpc: true, grpcHealth: false, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-news", dbSecret: "candle/dev/rds/news", dbEnvPrefix: "NEWS"}
          # batch는 상시 gRPC 서버(replica=1, HPA off). 스케줄은 앱 내부 @Scheduled가 담당(CronJob 아님).
          # 스케줄러 단일 실행 보장을 위해 replica=1 고정. 필요한 잡만 BATCH_*_ENABLED로 켠다.
          - {name: batch, tag: 89f47716cac2a7cdec5cbc7c0ec7cf32547f3f67, replicas: 1, grpc: true, http: false, metricsEnabled: false, hpaEnabled: false, roleArn: "arn:aws:iam::633597729239:role/candle-dev-batch", dbSecret: "candle/dev/rds/batch", dbEnvPrefix: "BATCH", env: [{name: "BATCH_TRADING_ENABLED", value: "true"}, {name: "BATCH_PORTFOLIO_EOD_ENABLED", value: "true"}, {name: "BATCH_STOCK_SYNC_ENABLED", value: "true"}, {name: "BATCH_MARKET_ORDER_BOOK_ENABLED", value: "true"}]}
          # ws Ingress(ALB)의 "/" → bff 타깃그룹 헬스체크가 기본 "/"(404)라 unhealthy→502.
          # bff 헬스는 /health 이므로 albHealthcheckPath로 타깃그룹 헬스체크 경로를 맞춘다.
          - {name: bff, tag: e8daff423c1592d26607cbeee65db857fc3fd4f6, grpc: false, http: true, metricsEnabled: true, hpaEnabled: true, healthPath: "/health", metricsPath: "/metrics", albHealthcheckPath: "/health", roleArn: "", dbSecret: "", env: [{name: "AUTH_JWKS_URI", value: "http://auth-service/.well-known/jwks.json"}, {name: "AUTH_JWT_ISSUER", value: "https://api.dev.candle.io.kr"}, {name: "AUTH_JWT_AUDIENCE", value: "candle-api"}]}
          # 종목 실시간 채팅 WS 게이트웨이 (gRPC 없음). REDIS_URL·CHAT_CORS_ALLOWED_ORIGINS는
          # chat 시크릿 번들(candle/dev/chat)로 envFrom 주입. ALB(ws ingress)가 /chat 타깃을 /actuator/health로 헬스체크.
          # WS 핸드셰이크 JWT 검증은 auth-service JWKS(RS256)로 — AUTH_JWKS_URI/ISSUER/AUDIENCE 미주입 시
          # 기본값(localhost/issuer불일치)으로 빠져 모든 토큰이 unauthorized가 된다(bff와 동일 값).
          - {name: chatting-service, tag: 1aeecc612ac8d3a148ea71a333adb4eec7c970ff, grpc: false, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "", dbSecret: "candle/dev/chat", albHealthcheckPath: "/actuator/health", env: [{name: "AUTH_JWKS_URI", value: "http://auth-service/.well-known/jwks.json"}, {name: "AUTH_JWT_ISSUER", value: "https://api.dev.candle.io.kr"}, {name: "AUTH_JWT_AUDIENCE", value: "candle-api"}]}
  template:
    metadata:
      name: "svc-{{ .name }}"
    spec:
      project: candle
      source:
        repoURL: https://github.com/take-profit-institute/candle-k8s.git
        targetRevision: main
        path: services/chart
        helm:
          # values(문자열 블록) — ArgoCD goTemplate이 렌더한 뒤 Helm이 올바른 타입(int/bool/list)으로 파싱.
          # valuesObject(구조체)는 unquoted {{ }}가 유효 YAML이 아니라 파싱 불가 → values 블록으로 처리.
          values: |
            name: {{ .name }}
            namespace: candle
            image:
              repository: 633597729239.dkr.ecr.ap-northeast-2.amazonaws.com/candle/{{ .name }}
              tag: {{ .tag }}
            replicas: {{ default 1 .replicas }}
            http:
              enabled: {{ .http }}
            grpc:
              enabled: {{ .grpc }}
              health: {{ if hasKey . "grpcHealth" }}{{ .grpcHealth }}{{ else }}true{{ end }}
            healthPath: {{ default "/actuator/health" .healthPath }}
            metrics:
              enabled: {{ .metricsEnabled }}
              path: {{ default "/actuator/prometheus" .metricsPath }}
            hpa:
              enabled: {{ .hpaEnabled }}
              minReplicas: {{ default 2 .hpaMinReplicas }}
            serviceAccount:
              roleArn: {{ .roleArn | quote }}
            dbSecret: {{ .dbSecret | quote }}
            dbEnvPrefix: {{ default "" .dbEnvPrefix | quote }}
            firebaseCredentialsSecret: {{ default "" .firebaseCredentialsSecret | quote }}
            kafkaBootstrap: "b-1.candledev.3ba4w8.c2.kafka.ap-northeast-2.amazonaws.com:9098,b-2.candledev.3ba4w8.c2.kafka.ap-northeast-2.amazonaws.com:9098"
            redis:
              rankingHost: "master.candle-dev-ranking.cq8heh.apn2.cache.amazonaws.com"
              priceCacheHost: "master.candle-dev-price-cache.cq8heh.apn2.cache.amazonaws.com"
              marketPubsubHost: "master.candle-dev-market-pubsub.cq8heh.apn2.cache.amazonaws.com"
            appSecret: {{ default "" .appSecret | quote }}
            albHealthcheckPath: {{ default "" .albHealthcheckPath | quote }}
            {{- with .env }}
            env:
              {{- range . }}
              - name: {{ .name }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: candle
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions:
          - RespectIgnoreDifferences=true
