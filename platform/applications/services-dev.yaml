# dev 마이크로서비스 — 범용 차트를 서비스별로 인스턴스화
# tag는 CI가 git SHA로 bump (ECR IMMUTABLE → latest 불가). 초기값 bootstrap.
# roleArn/dbSecret는 Terraform 출력과 1:1 (role명은 DB명 기준: user→users 등)
# <ACCOUNT_ID>는 실제 계정 ID로 치환 (terraform output irsa_app_role_arns)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: candle-services-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - { name: auth-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-auth",         dbSecret: "candle/dev/rds/auth",         dbEnvPrefix: "AUTH" }
          - { name: user-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-users",        dbSecret: "candle/dev/rds/users",        dbEnvPrefix: "USER" }
          - { name: trading-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-trading",      dbSecret: "candle/dev/rds/trading",      dbEnvPrefix: "TRADING" }
          - { name: portfolio-service,    tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-portfolio",    dbSecret: "candle/dev/rds/portfolio",    dbEnvPrefix: "PORTFOLIO" }
          - { name: ranking-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-ranking",      dbSecret: "candle/dev/rds/ranking",      dbEnvPrefix: "RANKING" }
          - { name: mission-service,      tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-mission",      dbSecret: "candle/dev/rds/mission",      dbEnvPrefix: "MISSION" }
          - { name: learning-service,     tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-learning",     dbSecret: "candle/dev/rds/learning",     dbEnvPrefix: "LEARNING" }
          - { name: market-service,       tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-market",       dbSecret: "candle/dev/timescale/market", dbEnvPrefix: "MARKET" }
          - { name: notification-service, tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-notification", dbSecret: "candle/dev/rds/notification", dbEnvPrefix: "NOTIFICATION" }
          - { name: stock-service,        tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-stock",        dbSecret: "candle/dev/rds/stock",        dbEnvPrefix: "STOCK" }
          - { name: wishlist-service,     tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-wishlist",     dbSecret: "candle/dev/rds/wishlist",     dbEnvPrefix: "WISHLIST" }
          - { name: news-service,         tag: bootstrap, grpc: true,  http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-news",         dbSecret: "candle/dev/rds/news",         dbEnvPrefix: "NEWS" }
          # batch는 상시 gRPC 서버(replica=1, HPA off). 스케줄은 앱 내부 @Scheduled가 담당(CronJob 아님).
          # 스케줄러 단일 실행 보장을 위해 replica=1 고정. 필요한 잡만 BATCH_*_ENABLED로 켠다.
          - { name: batch,                tag: bootstrap, replicas: 1, grpc: true,  http: false, metricsEnabled: false, hpaEnabled: false, roleArn: "arn:aws:iam::<ACCOUNT_ID>:role/candle-dev-batch",        dbSecret: "candle/dev/rds/batch",        dbEnvPrefix: "BATCH", env: [ { name: "BATCH_TRADING_ENABLED", value: "true" }, { name: "BATCH_PORTFOLIO_EOD_ENABLED", value: "true" }, { name: "BATCH_STOCK_SYNC_ENABLED", value: "true" } ] }
          - { name: bff,                  tag: bootstrap, grpc: false, http: true,  metricsEnabled: true,  hpaEnabled: true,  healthPath: "/health", metricsPath: "/metrics", roleArn: "",          dbSecret: "" }
          # 종목 실시간 채팅 WS 게이트웨이 (gRPC 없음). REDIS_URL·AUTH_JWT_HMAC_SECRET·CHAT_CORS_ALLOWED_ORIGINS는
          # chat 시크릿 번들(candle/dev/chat)로 envFrom 주입. ALB(ws ingress)가 /chat 타깃을 /actuator/health로 헬스체크.
          - { name: chatting-service,     tag: bootstrap, grpc: false, http: true,  metricsEnabled: true,  hpaEnabled: true,  roleArn: "",          dbSecret: "candle/dev/chat", albHealthcheckPath: "/actuator/health" }
  template:
    metadata:
      name: "svc-{{ .name }}"
    spec:
      project: candle
      source:
        repoURL: https://github.com/take-profit-institute/candle-k8s.git
        targetRevision: main
        path: services/chart
        helm:
          valuesObject:
            name: "{{ .name }}"
            namespace: candle
            image:
              repository: "<ECR>/candle/{{ .name }}"
              tag: "{{ .tag }}"
            replicas: {{ default 2 .replicas }}
            http:
              enabled: {{ .http }}
            grpc:
              enabled: {{ .grpc }}
            healthPath: '{{ default "/actuator/health" .healthPath }}'
            metrics:
              enabled: {{ .metricsEnabled }}
              path: '{{ default "/actuator/prometheus" .metricsPath }}'
            hpa:
              enabled: {{ .hpaEnabled }}
            serviceAccount:
              roleArn: "{{ .roleArn }}"
            dbSecret: "{{ .dbSecret }}"
            dbEnvPrefix: '{{ default "" .dbEnvPrefix }}'
            # ALB(ws ingress) 타깃 그룹 헬스체크 경로. 비우면 차트가 애너테이션 미생성(ALB 기본 "/").
            albHealthcheckPath: '{{ default "" .albHealthcheckPath }}'
            {{- if .env }}
            env:
              {{- range .env }}
              - name: {{ .name }}
                value: "{{ .value }}"
              {{- end }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: candle
      syncPolicy:
        automated: { prune: true, selfHeal: true }
