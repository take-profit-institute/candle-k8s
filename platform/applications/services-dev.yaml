# dev 마이크로서비스 — 범용 차트를 서비스별로 인스턴스화
# tag는 CI가 git SHA로 bump (ECR IMMUTABLE → latest 불가). 초기값 bootstrap.
# roleArn/dbSecret는 Terraform 출력과 1:1 (role명은 DB명 기준: user→users 등)
# 633597729239는 실제 계정 ID로 치환 (terraform output irsa_app_role_arns)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: candle-services-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - {name: auth-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-auth", dbSecret: "candle/dev/rds/auth", dbEnvPrefix: "AUTH"}
          - {name: user-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-users", dbSecret: "candle/dev/rds/users", dbEnvPrefix: "USER"}
          - {name: trading-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-trading", dbSecret: "candle/dev/rds/trading", dbEnvPrefix: "TRADING"}
          - {name: portfolio-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-portfolio", dbSecret: "candle/dev/rds/portfolio", dbEnvPrefix: "PORTFOLIO"}
          - {name: ranking-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-ranking", dbSecret: "candle/dev/rds/ranking", dbEnvPrefix: "RANKING"}
          - {name: mission-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-mission", dbSecret: "candle/dev/rds/mission", dbEnvPrefix: "MISSION"}
          - {name: learning-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-learning", dbSecret: "candle/dev/rds/learning", dbEnvPrefix: "LEARNING"}
          - {name: market-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-market", dbSecret: "candle/dev/timescale/market", dbEnvPrefix: "MARKET"}
          - {name: notification-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-notification", dbSecret: "candle/dev/rds/notification", dbEnvPrefix: "NOTIFICATION"}
          - {name: stock-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-stock", dbSecret: "candle/dev/rds/stock", dbEnvPrefix: "STOCK"}
          - {name: wishlist-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-wishlist", dbSecret: "candle/dev/rds/wishlist", dbEnvPrefix: "WISHLIST"}
          - {name: news-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: true, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "arn:aws:iam::633597729239:role/candle-dev-news", dbSecret: "candle/dev/rds/news", dbEnvPrefix: "NEWS"}
          # batch는 상시 gRPC 서버(replica=1, HPA off). 스케줄은 앱 내부 @Scheduled가 담당(CronJob 아님).
          # 스케줄러 단일 실행 보장을 위해 replica=1 고정. 필요한 잡만 BATCH_*_ENABLED로 켠다.
          - {name: batch, tag: 724e74422cf6546146f9d8286a4a7a56b8934a84, replicas: 1, grpc: true, http: false, metricsEnabled: false, hpaEnabled: false, roleArn: "arn:aws:iam::633597729239:role/candle-dev-batch", dbSecret: "candle/dev/rds/batch", dbEnvPrefix: "BATCH", env: [{name: "BATCH_TRADING_ENABLED", value: "true"}, {name: "BATCH_PORTFOLIO_EOD_ENABLED", value: "true"}, {name: "BATCH_STOCK_SYNC_ENABLED", value: "true"}]}
          - {name: bff, tag: d6914daf3455e2082f7ade92631a9063bc74760c, grpc: false, http: true, metricsEnabled: true, hpaEnabled: true, healthPath: "/health", metricsPath: "/metrics", roleArn: "", dbSecret: ""}
          # 종목 실시간 채팅 WS 게이트웨이 (gRPC 없음). REDIS_URL·AUTH_JWT_HMAC_SECRET·CHAT_CORS_ALLOWED_ORIGINS는
          # chat 시크릿 번들(candle/dev/chat)로 envFrom 주입. ALB(ws ingress)가 /chat 타깃을 /actuator/health로 헬스체크.
          - {name: chatting-service, tag: ad8fd2d1cd3edb41524236fa88c5ae06b9211906, grpc: false, http: true, metricsEnabled: true, hpaEnabled: true, roleArn: "", dbSecret: "candle/dev/chat", albHealthcheckPath: "/actuator/health"}
  template:
    metadata:
      name: "svc-{{ .name }}"
    spec:
      project: candle
      source:
        repoURL: https://github.com/take-profit-institute/candle-k8s.git
        targetRevision: main
        path: services/chart
        helm:
          # values(문자열 블록) — ArgoCD goTemplate이 렌더한 뒤 Helm이 올바른 타입(int/bool/list)으로 파싱.
          # valuesObject(구조체)는 unquoted {{ }}가 유효 YAML이 아니라 파싱 불가 → values 블록으로 처리.
          values: |
            name: {{ .name }}
            namespace: candle
            image:
              repository: 633597729239.dkr.ecr.ap-northeast-2.amazonaws.com/candle/{{ .name }}
              tag: {{ .tag }}
            replicas: {{ default 1 .replicas }}
            http:
              enabled: {{ .http }}
            grpc:
              enabled: {{ .grpc }}
            healthPath: {{ default "/actuator/health" .healthPath }}
            metrics:
              enabled: {{ .metricsEnabled }}
              path: {{ default "/actuator/prometheus" .metricsPath }}
            hpa:
              enabled: {{ .hpaEnabled }}
            serviceAccount:
              roleArn: {{ .roleArn | quote }}
            dbSecret: {{ .dbSecret | quote }}
            dbEnvPrefix: {{ default "" .dbEnvPrefix | quote }}
            albHealthcheckPath: {{ default "" .albHealthcheckPath | quote }}
            {{- with .env }}
            env:
              {{- range . }}
              - name: {{ .name }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: candle
      syncPolicy:
        automated: {prune: true, selfHeal: true}
