# WebSocket 전용 인터넷 ALB — ws.<domain> (WS는 HTTP API Gateway로 못 감)
# AWS LB Controller가 이 Ingress로 인터넷 ALB를 생성한다.
#   /chat/* → chatting-service (종목 채팅 WS + 방배정 REST)
#   /       → bff             (시세 WS)
# - 인증서는 host(ws.<domain>)와 매칭되는 ACM을 컨트롤러가 자동탐색
#   (Terraform이 발급한 ws 인증서. certificate-arn 명시 불필요)
# - external-dns가 host 레코드를 ALB로 자동 생성
# - idle-timeout 상향(긴 WS 연결) + WS는 ALB가 네이티브 지원
# - 경로별 헬스체크는 각 Service 애너테이션(alb.ingress.kubernetes.io/healthcheck-path)으로
#   타깃 그룹마다 지정(chatting-service=/actuator/health). 더 구체적인 /chat을 먼저 둔다.
# host/도메인은 base=dev, prod는 overlays/prod에서 패치
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws
  namespace: candle
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
    external-dns.alpha.kubernetes.io/hostname: ws.dev.candle.io.kr
spec:
  rules:
    - host: ws.dev.candle.io.kr
      http:
        paths:
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chatting-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff
                port:
                  number: 80
