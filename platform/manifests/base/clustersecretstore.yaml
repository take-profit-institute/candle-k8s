# External Secrets Operator → AWS Secrets Manager (ESO는 Terraform이 설치)
# external-secrets SA에 IRSA(external_secrets_role_arn)가 붙어 있어 인증 자동.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
