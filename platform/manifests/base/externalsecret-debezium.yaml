# Debezium replication 자격증명 (Secrets Manager → k8s Secret)
# 환경별 키: overlays/prod 에서 dev→prod 패치
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: debezium-db
  namespace: kafka
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: debezium-db
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: candle/dev/rds/debezium
