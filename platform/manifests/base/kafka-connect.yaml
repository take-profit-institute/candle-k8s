# Strimzi KafkaConnect (Debezium 런타임). 이름 "debezium" → SA "debezium-connect"
# (Terraform irsa_debezium 와 매칭: namespace kafka / SA debezium-connect)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 3.8.0
  replicas: 1
  # SASL/SCRAM 엔드포인트(9096). Strimzi가 MSK IAM auth를 지원하지 않아 Debezium 커넥트만
  # SCRAM으로 붙는다(앱 서비스는 계속 IAM 9098). terraform output bootstrap_brokers_sasl_scram.
  bootstrapServers: b-1.candledev.3ba4w8.c2.kafka.ap-northeast-2.amazonaws.com:9096,b-2.candledev.3ba4w8.c2.kafka.ap-northeast-2.amazonaws.com:9096

  # 전송구간 TLS(MSK client_broker=TLS). MSK 서버 인증서는 공용 Amazon CA → JVM 기본 truststore.
  tls:
    trustedCertificates: []
  # SASL/SCRAM 인증 — Terraform aws_msk_scram_secret_association 로 등록한 debezium 사용자.
  # 비밀번호는 debezium-msk-scram Secret(ExternalSecret)에서 주입.
  authentication:
    type: scram-sha-512
    username: debezium
    passwordSecret:
      secretName: debezium-msk-scram
      password: password

  build:
    output:
      type: docker
      image: 633597729239.dkr.ecr.ap-northeast-2.amazonaws.com/candle/debezium-connect:latest # build once → ECR
      pushSecret: ecr-push # ECR 자격증명 secret
    plugins:
      - name: debezium-postgres
        artifacts:
          - type: tgz
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/2.7.3.Final/debezium-connector-postgres-2.7.3.Final-plugin.tar.gz
      - name: msk-iam-auth
        artifacts:
          - type: jar
            url: https://github.com/aws/aws-msk-iam-auth/releases/download/v2.2.0/aws-msk-iam-auth-2.2.0-all.jar

  config:
    group.id: candle-connect
    offset.storage.topic: connect-offsets
    config.storage.topic: connect-configs
    status.storage.topic: connect-status
    config.storage.replication.factor: 2
    offset.storage.replication.factor: 2
    status.storage.replication.factor: 2
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    # security.protocol/sasl.* 은 위 tls+authentication 으로 Strimzi가 자동 설정한다.
    # (spec.config 에는 sasl./security./ssl. 접두사 설정이 Strimzi에서 금지됨)
    # k8s Secret을 커넥터 config에서 ${secrets:...} 로 참조
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider

  template:
    serviceAccount:
      metadata:
        annotations:
          # arn:aws:iam::633597729239:role/candle-<env>-debezium
          eks.amazonaws.com/role-arn: arn:aws:iam::633597729239:role/candle-dev-debezium
