# Auth outbox — UserCreated 등. 단일 candle DB의 auth 스키마 outbox_events → Kafka.
# publication 은 사전 생성(소유자 권한) 하고 커넥터는 autocreate off + 고유 publication.name 참조.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: auth-outbox
  namespace: kafka
  labels:
    strimzi.io/cluster: debezium
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: ${secrets:kafka/debezium-db:host}
    database.port: 5432
    database.user: ${secrets:kafka/debezium-db:username}
    database.password: ${secrets:kafka/debezium-db:password}
    # 단일 application DB (Terraform application_database_name = candle)
    database.dbname: candle
    topic.prefix: candle.auth
    plugin.name: pgoutput
    slot.name: debezium_auth
    # 단일 DB에 커넥터가 여러 개 → publication 이름 충돌 방지로 커넥터별 고유 이름 + 사전생성
    publication.name: dbz_pub_auth
    publication.autocreate.mode: disabled
    table.include.list: auth.outbox_events
    # Outbox Event Router — event_type 값(예: auth.user-created.v1)을 그대로 토픽으로 라우팅, key=aggregate_id
    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter
    transforms.outbox.route.by.field: event_type
    transforms.outbox.route.topic.replacement: ${routedByValue}
    transforms.outbox.table.field.event.key: aggregate_id
    transforms.outbox.table.field.event.type: event_type
    # occurred_at 이 timestamptz(→Debezium STRING) 라 EventRouter의 event.timestamp(INT64 요구)로
    # 못 쓴다. 다른 서비스는 timestamp 라 매핑하지만 여기선 생략(레코드 타임스탬프만 기본값 사용).
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: false
