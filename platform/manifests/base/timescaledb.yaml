# Market 시계열 DB — TimescaleDB StatefulSet (RDS 미지원이라 인클러스터)
# 자격증명: Secrets Manager candle/<env>/timescale/market → ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: timescaledb-creds
  namespace: candle
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: timescaledb-creds
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: candle/dev/timescale/market
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: candle
spec:
  clusterIP: None
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: candle
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:2.17.1-pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: market
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: timescaledb-creds, key: username }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: timescaledb-creds, key: password }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 50Gi
