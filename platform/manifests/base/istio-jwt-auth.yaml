# 메시 진입 JWT 인증 — 미배포된 스프링 게이트웨이(AccountIdInjectionFilter)를 대체한다.
# APIGW → NLB → istio-ingressgateway 진입 지점에서 auth-service JWKS(RS256)로 access token을
# 검증하고, sub/role claim을 X-Account-Id / X-Account-Role 헤더로 주입해 BFF로 전달한다.
# (BFF resolveActor 는 이 헤더가 없으면 'demo-user'로 폴백하므로, 주입이 없으면 전 유저가 demo-user가 됨)
#
# 대상 워크로드 = istio-ingress 네임스페이스의 ingressgateway 파드(라벨 istio: ingressgateway).
# 정책은 워크로드와 같은 네임스페이스에 있어야 적용된다.
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: candle-jwt
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  jwtRules:
    # 토큰 발급자/대상 — BFF·chatting에 주입된 AUTH_JWT_ISSUER / AUTH_JWT_AUDIENCE 와 동일해야 한다.
    - issuer: "https://api.dev.candle.io.kr"
      audiences:
        - "candle-api"
      # istiod가 in-cluster로 JWKS를 가져온다(공개키 캐시/리프레시).
      jwksUri: "http://auth-service.candle.svc.cluster.local/.well-known/jwks.json"
      # 원본 Authorization 토큰을 업스트림(BFF)으로 그대로 전달(BFF account-context 플러그인도 검증 가능).
      forwardOriginalToken: true
      # 검증 성공 시 claim → 요청 헤더 주입. 기존 헤더가 있으면 덮어써(overwrite) 클라이언트 위조를 차단한다.
      outputClaimToHeaders:
        - header: "X-Account-Id"
          claim: "sub"
        - header: "X-Account-Role"
          claim: "role"
---
# 유효 JWT가 없는 요청 차단. RequestAuthentication은 "토큰이 있으면 검증"만 하고 무토큰은 통과시키므로,
# 이 정책이 없으면 무토큰 요청이 여전히 헤더 없이 BFF로 가 demo-user로 폴백된다.
# /api/account/** 만 우선 보호(계정·포트폴리오 조회). 다른 유저 스코프 경로(/api/user, /api/notifications,
# /api/social 등)도 필요하면 paths 에 추가한다. OPTIONS(CORS preflight)는 토큰이 없으므로 제외한다.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: candle-require-jwt
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: DENY
  rules:
    - to:
        - operation:
            paths:
              - "/api/account/*"
            notMethods:
              - "OPTIONS"
      from:
        - source:
            notRequestPrincipals:
              - "*"
